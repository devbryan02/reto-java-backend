spring.application.name=saga-orchestrator

spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/${SAGA_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=none

spring.flyway.baseline-on-migrate=true
spring.flyway.url=jdbc:postgresql://${DB_HOST}:5432/${SAGA_DB}
spring.flyway.user=${POSTGRES_USER}
spring.flyway.password=${POSTGRES_PASSWORD}
spring.flyway.locations=classpath:db/migration

# URLs internas de los microservicios (via docker network, por nombre de servicio)
services.order-service.url=${ORDER_SERVICE_URL:http://order-service:8082}
services.inventory-service.url=${INVENTORY_SERVICE_URL:http://inventory-service:8083}
services.dispatch-service.url=${DISPATCH_SERVICE_URL:http://dispatch-service:8084}